name: interdex

services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    # No host port binding here on purpose — Dokploy/Coolify route traffic
    # to this container over the internal Docker network via their own
    # reverse proxy. Configure the domain/path -> container port (4000)
    # mapping in the platform's dashboard instead of publishing to the host,
    # which is what caused "port is already allocated".
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - default
      - dokploy-network

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
    restart: unless-stopped
    # Same as backend — let the platform's proxy reach this over the
    # internal network instead of binding host port 5173.
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network

networks:
  # Dokploy's standalone "Database" resources (and its reverse proxy) live
  # on this shared network, not the isolated per-compose-project network
  # Compose creates by default. Both services above join it explicitly so
  # they can resolve/reach apps-interdex-csv0y5 (and be reached by Traefik).
  # `external: true` means Dokploy must have already created it — it does,
  # automatically, on install. If your Dokploy instance named it differently,
  # check with `docker network ls` on the host and swap the name below.
  dokploy-network:
    external: true
