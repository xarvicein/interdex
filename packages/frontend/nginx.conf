server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Docker's embedded DNS. Resolving "backend" through a variable (below)
    # defers the lookup to request time instead of nginx startup time, so
    # this container doesn't fail to boot if it starts before the backend
    # container is ready.
    resolver 127.0.0.11 valid=10s;

    # Proxy API calls to the backend container over the internal Compose
    # network. This means the platform's reverse proxy only ever needs one
    # rule for the whole domain -> this frontend service; there's no need
    # to get path-based routing right in the platform's own dashboard.
    location /api/ {
        set $backend http://backend:4000;
        proxy_pass $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — client-side routing (react-router) owns everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
